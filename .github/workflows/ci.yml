name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;27.0.12077973" "cmake;3.22.1" > /dev/null

      - name: Unit tests
        run: ./gradlew :edgellm-core:testDebugUnitTest :edgellm-engine-llamacpp:testDebugUnitTest

      - name: Assemble minified sample (exercises native build + R8 consumer rules)
        run: ./gradlew :sample:assembleRelease
